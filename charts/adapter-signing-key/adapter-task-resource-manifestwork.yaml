# ManifestWork that deploys keygen resources to the management cluster.
# Generates an RSA signing keypair on the MC. The private key never leaves the MC.
# The public key is published as JWKS to the GCS OIDC issuer bucket.
apiVersion: work.open-cluster-management.io/v1
kind: ManifestWork
metadata:
  name: "{{ .clusterId }}-adapter-signing-key"
  labels:
    hyperfleet.io/cluster-id: "{{ .clusterId }}"
    hyperfleet.io/adapter: "adapter-signing-key"
    hyperfleet.io/component: "signing-key"
  annotations:
    hyperfleet.io/generation: "{{ .generation }}"
spec:
  workload:
    manifests:

      # --- Manifest 0: Namespace ---
      - apiVersion: v1
        kind: Namespace
        metadata:
          name: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/cluster-name: "{{ .clusterName }}"
            hyperfleet.io/managed-by: "adapter-signing-key"
            hyperfleet.io/resource-type: "namespace"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"

      # --- Manifest 1: ServiceAccount for keygen Job ---
      # WIF annotation maps this K8s SA to a GCP SA with GCS write access
      - apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: keygen-sa
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "adapter-signing-key"
            hyperfleet.io/resource-type: "service-account"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
            iam.gke.io/gcp-service-account: "{{ .keygenGcpSA }}"

      # --- Manifest 2: Role (create/get secrets in namespace) ---
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: keygen-role
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "adapter-signing-key"
            hyperfleet.io/resource-type: "role"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        rules:
          - apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "create"]

      # --- Manifest 3: RoleBinding ---
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: keygen-rolebinding
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "adapter-signing-key"
            hyperfleet.io/resource-type: "role-binding"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        subjects:
          - kind: ServiceAccount
            name: keygen-sa
            namespace: "clusters-{{ .clusterId }}"
        roleRef:
          kind: Role
          name: keygen-role
          apiGroup: rbac.authorization.k8s.io

      # --- Manifest 4: Keygen Job ---
      # Generates RSA 4096-bit keypair, stores private key as K8s Secret,
      # publishes public key as JWKS + OIDC discovery to GCS issuer bucket.
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: "keygen-{{ .clusterId }}"
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "adapter-signing-key"
            hyperfleet.io/resource-type: "keygen-job"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        spec:
          backoffLimit: 3
          ttlSecondsAfterFinished: 3600
          template:
            metadata:
              labels:
                hyperfleet.io/cluster-id: "{{ .clusterId }}"
                hyperfleet.io/component: "keygen"
            spec:
              serviceAccountName: keygen-sa
              restartPolicy: OnFailure
              containers:
                - name: keygen
                  image: "{{ .keygenImage }}"
                  env:
                    - name: CLUSTER_ID
                      value: "{{ .clusterId }}"
                    - name: CLUSTER_NAME
                      value: "{{ .clusterName }}"
                    - name: NAMESPACE
                      value: "clusters-{{ .clusterId }}"
                    - name: SECRET_NAME
                      value: "{{ .clusterName }}-signing-key"
                    - name: ISSUER_URL
                      value: "{{ .issuerURL }}"
                  command: ["/bin/bash", "-c"]
                  args:
                    - |
                      set -euo pipefail

                      echo "=== Signing Key Generator ==="
                      echo "Cluster: ${CLUSTER_NAME} (${CLUSTER_ID})"
                      echo "Namespace: ${NAMESPACE}"
                      echo "Secret: ${SECRET_NAME}"
                      echo "Issuer URL: ${ISSUER_URL}"

                      TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                      CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                      API=https://kubernetes.default.svc

                      # Idempotency: skip if secret already exists
                      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                        --cacert "$CA" -H "Authorization: Bearer $TOKEN" \
                        "${API}/api/v1/namespaces/${NAMESPACE}/secrets/${SECRET_NAME}")

                      if [ "$HTTP_CODE" = "200" ]; then
                        echo "Secret ${SECRET_NAME} already exists — skipping generation"
                        exit 0
                      fi

                      echo "Generating 4096-bit RSA signing keypair..."
                      openssl genrsa -out /tmp/sa-signer.key 4096 2>/dev/null
                      openssl rsa -in /tmp/sa-signer.key -pubout -out /tmp/sa-signer.pub 2>/dev/null

                      # Create K8s Secret with private key
                      KEY_B64=$(base64 -w 0 /tmp/sa-signer.key)
                      HTTP_CODE=$(curl -s -o /tmp/create-result.json -w "%{http_code}" \
                        --cacert "$CA" -H "Authorization: Bearer $TOKEN" \
                        -H "Content-Type: application/json" -X POST \
                        "${API}/api/v1/namespaces/${NAMESPACE}/secrets" \
                        -d "{
                          \"apiVersion\": \"v1\",
                          \"kind\": \"Secret\",
                          \"metadata\": {
                            \"name\": \"${SECRET_NAME}\",
                            \"namespace\": \"${NAMESPACE}\",
                            \"labels\": {
                              \"hyperfleet.io/cluster-id\": \"${CLUSTER_ID}\",
                              \"hyperfleet.io/managed-by\": \"adapter-signing-key\",
                              \"hyperfleet.io/resource-type\": \"signing-key\"
                            }
                          },
                          \"type\": \"Opaque\",
                          \"data\": { \"key\": \"${KEY_B64}\" }
                        }")

                      if [ "$HTTP_CODE" != "201" ]; then
                        echo "ERROR: Failed to create secret (HTTP ${HTTP_CODE})"
                        cat /tmp/create-result.json
                        exit 1
                      fi
                      echo "Secret ${SECRET_NAME} created successfully"

                      # Generate JWKS from public key
                      ISSUER_BUCKET="${ISSUER_URL#https://storage.googleapis.com/}"
                      echo "Generating JWKS for bucket: ${ISSUER_BUCKET}"

                      python3 -c "
                      import json, base64, subprocess, os

                      result = subprocess.run(
                          ['openssl', 'rsa', '-pubin', '-in', '/tmp/sa-signer.pub', '-modulus', '-noout'],
                          capture_output=True, text=True, check=True)
                      mod_hex = result.stdout.strip().split('=')[1]
                      mod_bytes = bytes.fromhex(mod_hex)

                      def b64url(b):
                          return base64.urlsafe_b64encode(b).rstrip(b'=').decode()

                      jwks = {'keys': [{
                          'kty': 'RSA', 'use': 'sig', 'alg': 'RS256', 'kid': 'signing-key-1',
                          'n': b64url(mod_bytes), 'e': b64url(b'\x01\x00\x01'),
                      }]}

                      issuer = os.environ['ISSUER_URL']
                      oidc = {
                          'issuer': issuer,
                          'jwks_uri': issuer + '/keys.json',
                          'authorization_endpoint': 'urn:kubernetes:programmatic_authorization',
                          'response_types_supported': ['id_token'],
                          'subject_types_supported': ['public'],
                          'id_token_signing_alg_values_supported': ['RS256'],
                          'claims_supported': ['sub', 'iss'],
                      }

                      with open('/tmp/keys.json', 'w') as f:
                          json.dump(jwks, f, indent=2)
                      with open('/tmp/openid-configuration', 'w') as f:
                          json.dump(oidc, f, indent=2)
                      print('JWKS and OIDC discovery documents generated')
                      "

                      # Upload OIDC documents to GCS issuer bucket (best-effort for prototype)
                      echo "Uploading OIDC documents to gs://${ISSUER_BUCKET}/"
                      if gcloud storage cp /tmp/keys.json "gs://${ISSUER_BUCKET}/keys.json" 2>/dev/null && \
                         gcloud storage cp /tmp/openid-configuration "gs://${ISSUER_BUCKET}/.well-known/openid-configuration" 2>/dev/null; then
                        echo "OIDC documents uploaded successfully"
                      else
                        echo "WARNING: GCS upload skipped (no bucket access). Secret was created successfully."
                        echo "JWKS upload can be done manually or once GCS IAM is configured."
                      fi

                      # Cleanup key material from disk
                      rm -f /tmp/sa-signer.key /tmp/sa-signer.pub

                      echo "=== Signing Key Generation Complete ==="
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi

  deleteOption:
    propagationPolicy: "Foreground"

  manifestConfigs:
    - resourceIdentifier:
        group: ""
        resource: "namespaces"
        name: "clusters-{{ .clusterId }}"
      updateStrategy:
        type: "ServerSideApply"
      feedbackRules:
        - type: "JSONPaths"
          jsonPaths:
            - name: "phase"
              path: ".status.phase"

    - resourceIdentifier:
        group: "batch"
        resource: "jobs"
        namespace: "clusters-{{ .clusterId }}"
        name: "keygen-{{ .clusterId }}"
      updateStrategy:
        type: "ServerSideApply"
      feedbackRules:
        - type: "JSONPaths"
          jsonPaths:
            - name: "succeeded"
              path: ".status.succeeded"
            - name: "failed"
              path: ".status.failed"
            - name: "active"
              path: ".status.active"
