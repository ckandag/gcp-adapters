# HyperFleet Adapter - HostedCluster deployment configuration
# This adapter creates HostedCluster and supporting resources on the management cluster
# via Maestro (ManifestWork over GCP Pub/Sub). No kubeconfig or direct cluster access needed.
apiVersion: hyperfleet.redhat.com/v1alpha1
kind: AdapterConfig
metadata:
  name: adapter-hc
  labels:
    hyperfleet.io/adapter-type: maestro
    hyperfleet.io/component: adapter
spec:
  adapter:
    version: "0.1.0"

  debugConfig: true
  log:
    level: debug

  clients:
    hyperfleetApi:
      baseUrl: http://hyperfleet-api:8000
      version: v1
      timeout: 10s
      retryAttempts: 3
      retryBackoff: exponential

    maestro:
      # Maestro Server gRPC endpoint — in-cluster, same namespace (hyperfleet)
      grpcServerAddress: "maestro-grpc.hyperfleet.svc.cluster.local:8090"
      # Maestro Server HTTP endpoint — for REST API operations
      httpServerAddress: "http://maestro.hyperfleet.svc.cluster.local:8000"
      # Source identifier for CloudEvents routing — must be unique per adapter
      sourceId: "hyperfleet-adapter-hc"
      clientId: "hyperfleet-adapter-hc-client"
      insecure: true
