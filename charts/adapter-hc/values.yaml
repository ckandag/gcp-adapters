# Default values for adapter-hc (HostedCluster adapter)

hyperfleet-adapter:
  image:
    registry: quay.io/openshift-hyperfleet
    repository: hyperfleet-adapter
    pullPolicy: Always
    tag: v0.1.1

  adapterConfig:
    create: true
    # injected via ArgoCD fileParameters

  adapterTaskConfig:
    create: false
    configMapName: adapter-hc-resources

  broker:
    create: true
    googlepubsub:
      projectId: "dev-reg-us-c1-ckandag910f"
      subscriptionId: hyperfleet-cluster-events-adapter-hc
      topic: hyperfleet-cluster-events
      createTopicIfMissing: false
      createSubscriptionIfMissing: false

  serviceAccount:
    create: true
    name: hyperfleet-adapter-hc
    annotations:
      iam.gke.io/gcp-service-account: hc-adapter@dev-reg-us-c1-ckandag910f.iam.gserviceaccount.com

  env:
    - name: NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: HC_RELEASE_IMAGE
      value: "quay.io/openshift-release-dev/ocp-release:4.20.0-x86_64"
    - name: PULL_SECRET_STORE_NAME
      value: "gcp-secret-manager"
    - name: PULL_SECRET_GCP_KEY
      value: "default-openshift-pull-secret"

  rbac:
    resources:
      - namespaces
      - secrets
      - configmaps
