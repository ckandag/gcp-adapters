# HyperFleet Adapter - HostedCluster task configuration
# Creates Namespace, pull-secret, signing-key, Certificate, and HostedCluster
# on the target management cluster via Maestro ManifestWork over GCP Pub/Sub.
apiVersion: hyperfleet.redhat.com/v1alpha1
kind: AdapterTaskConfig
metadata:
  name: adapter-hc
  labels:
    hyperfleet.io/adapter-type: maestro
    hyperfleet.io/component: adapter
spec:
  # ============================================================================
  # Phase 1: Parameter extraction
  # ============================================================================
  params:
    - name: "clusterId"
      source: "event.id"
      type: "string"
      required: true

    - name: "generation"
      source: "event.generation"
      type: "int"
      required: true

    - name: "baseDomain"
      source: "env.HC_BASE_DOMAIN"
      type: "string"
      required: true
      description: "Base domain for hosted cluster DNS (e.g. hc-us-central1-nkcw.int.gcp-hcp.devshift.net)"

    - name: "releaseImage"
      source: "env.HC_RELEASE_IMAGE"
      type: "string"
      default: "quay.io/openshift-release-dev/ocp-release:4.20.0-x86_64"

    - name: "pullSecretStoreName"
      source: "env.PULL_SECRET_STORE_NAME"
      type: "string"
      default: "global-gcp-secret-manager"

    - name: "pullSecretGcpKey"
      source: "env.PULL_SECRET_GCP_KEY"
      type: "string"
      default: "openshift-pull-secret"

  # ============================================================================
  # Phase 2: Preconditions - fetch cluster details from HyperFleet API
  # ============================================================================
  preconditions:
    - name: "clusterDetails"
      apiCall:
        method: "GET"
        url: "/clusters/{{ .clusterId }}"
        timeout: 10s
        retryAttempts: 3
        retryBackoff: "exponential"
      capture:
        - name: "clusterName"
          field: "name"
        - name: "generation"
          field: "generation"
        - name: "createdBy"
          field: "created_by"
        - name: "infraID"
          expression: "spec.infraID"
        - name: "issuerURL"
          expression: "spec.?issuerURL.orValue('')"
        - name: "serviceAccountSigningKey"
          expression: "spec.?serviceAccountSigningKey.orValue('')"

        # GCP platform fields
        - name: "gcpProjectID"
          expression: "spec.platform.gcp.projectID"
        - name: "gcpRegion"
          expression: "spec.platform.gcp.region"
        - name: "gcpNetwork"
          expression: "spec.platform.gcp.network"
        - name: "gcpSubnet"
          expression: "spec.platform.gcp.subnet"
        - name: "gcpEndpointAccess"
          expression: "spec.platform.gcp.?endpointAccess.orValue('Private')"

        # WIF fields
        - name: "wifProjectNumber"
          expression: "spec.platform.gcp.workloadIdentity.projectNumber"
        - name: "wifPoolID"
          expression: "spec.platform.gcp.workloadIdentity.poolID"
        - name: "wifProviderID"
          expression: "spec.platform.gcp.workloadIdentity.providerID"
        - name: "nodePoolEmail"
          expression: "spec.platform.gcp.workloadIdentity.serviceAccountsRef.nodePoolEmail"
        - name: "controlPlaneEmail"
          expression: "spec.platform.gcp.workloadIdentity.serviceAccountsRef.controlPlaneEmail"
        - name: "cloudControllerEmail"
          expression: "spec.platform.gcp.workloadIdentity.serviceAccountsRef.cloudControllerEmail"
        - name: "storageEmail"
          expression: "spec.platform.gcp.workloadIdentity.serviceAccountsRef.storageEmail"
        - name: "imageRegistryEmail"
          expression: "spec.platform.gcp.workloadIdentity.serviceAccountsRef.imageRegistryEmail"

        # RFC4122 UUID for HostedCluster spec.clusterID
        - name: "hcClusterID"
          expression: "spec.?clusterID.orValue(id)"

        # Ready condition check
        - name: "readyConditionStatus"
          expression: |
            status.conditions.filter(c, c.type == "Ready").size() > 0
              ? status.conditions.filter(c, c.type == "Ready")[0].status
              : "False"

        - name: "slug"
          expression: "'user'"

      conditions:
        - field: "readyConditionStatus"
          operator: "equals"
          value: "False"

    # Fetch the placement decision from adapter-placement-job's status.
    # The placement adapter writes data.managementClusterName with the
    # Maestro consumerName of the selected MC.
    - name: "placementStatus"
      apiCall:
        method: "GET"
        url: "/clusters/{{ .clusterId }}/statuses"
        timeout: 10s
        retryAttempts: 3
        retryBackoff: "exponential"
      capture:
        - name: "targetCluster"
          expression: |
            items.filter(s, s.adapter == "adapter-placement-job").size() > 0
            && has(items.filter(s, s.adapter == "adapter-placement-job")[0].data)
            && has(items.filter(s, s.adapter == "adapter-placement-job")[0].data.managementClusterName)
            && items.filter(s, s.adapter == "adapter-placement-job")[0].data.managementClusterName != ""
              ? items.filter(s, s.adapter == "adapter-placement-job")[0].data.managementClusterName
              : ""

    # Gate: only proceed if placement has been decided and cluster is not Ready.
    - name: "placementReady"
      expression: |
        targetCluster != "" && readyConditionStatus == "False"

  # ============================================================================
  # Phase 3: Resources - deliver via Maestro ManifestWork to the target MC
  #
  # All 5 resources (Namespace, PullSecret, SigningKey, Certificate, HostedCluster)
  # are bundled into a single ManifestWork. Maestro routes it to the target MC
  # identified by targetCluster (read from adapter-placement-job's status).
  # ============================================================================
  resources:
    - name: "hostedClusterBundle"
      transport:
        client: "maestro"
        maestro:
          targetCluster: "{{ .targetCluster }}"

      # ManifestWork definition lives in a separate file for readability.
      # The framework loads and inlines it before template rendering.
      manifest:
        ref: "/etc/adapter/manifestwork.yaml"

      # Discover the ManifestWork by name from Maestro
      discovery:
        byName: "{{ .clusterId }}-adapter-hc"

      # Discover nested resources applied by the ManifestWork on the MC
      nestedDiscoveries:
        - name: "clusterNamespace"
          discovery:
            byName: "clusters-{{ .clusterId }}"
        - name: "hostedCluster"
          discovery:
            byName: "{{ .clusterName }}"

  # ============================================================================
  # Phase 4: Status reporting
  # ============================================================================
  post:
    payloads:
      - name: "statusPayload"
        build:
          adapter: "{{ .metadata.name }}"
          conditions:
            # Applied: ManifestWork accepted by Maestro and applied by the agent
            - type: "Applied"
              status:
                expression: |
                  has(resources.hostedClusterBundle) && has(resources.hostedClusterBundle.status)
                  && has(resources.hostedClusterBundle.status.conditions)
                  && resources.hostedClusterBundle.status.conditions.filter(c, has(c.type) && c.type == "Applied").size() > 0
                  ? resources.hostedClusterBundle.status.conditions.filter(c, c.type == "Applied")[0].status
                  : "False"
              reason:
                expression: |
                  has(resources.hostedClusterBundle) && has(resources.hostedClusterBundle.status)
                  && has(resources.hostedClusterBundle.status.conditions)
                  && resources.hostedClusterBundle.status.conditions.filter(c, has(c.type) && c.type == "Applied").size() > 0
                  ? resources.hostedClusterBundle.status.conditions.filter(c, c.type == "Applied")[0].reason
                  : "ManifestWorkNotApplied"
              message:
                expression: |
                  has(resources.hostedClusterBundle) && has(resources.hostedClusterBundle.status)
                  && has(resources.hostedClusterBundle.status.conditions)
                  && resources.hostedClusterBundle.status.conditions.filter(c, has(c.type) && c.type == "Applied").size() > 0
                  ? resources.hostedClusterBundle.status.conditions.filter(c, c.type == "Applied")[0].message
                  : "ManifestWork not yet applied by Maestro agent"

            # Available: HostedCluster Available condition (fed back via manifestConfigs)
            - type: "Available"
              status:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                  && has(resources.hostedCluster.statusFeedback.values)
                  && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "availableCondition")
                  ? resources.hostedCluster.statusFeedback.values.filter(v, v.name == "availableCondition")[0].fieldValue.string
                  : "Unknown"
              reason:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                  && has(resources.hostedCluster.statusFeedback.values)
                  && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "availableCondition")
                  ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "availableCondition")[0].fieldValue.string == "True"
                    ? "HostedClusterAvailable" : "HostedClusterNotAvailable")
                  : "ConditionNotFound"
              message:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                  && has(resources.hostedCluster.statusFeedback.values)
                  && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "availableCondition")
                  ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "availableCondition")[0].fieldValue.string == "True"
                    ? "HostedCluster is available"
                    : "HostedCluster not yet available")
                  : "HostedCluster Available condition not yet reported"

            # Health: HostedCluster not degraded (fed back via manifestConfigs)
            - type: "Health"
              status:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                  && has(resources.hostedCluster.statusFeedback.values)
                  && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "degradedCondition")
                  ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "degradedCondition")[0].fieldValue.string == "False"
                    ? "True" : "False")
                  : "Unknown"
              reason:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                  && has(resources.hostedCluster.statusFeedback.values)
                  && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "degradedCondition")
                  ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "degradedCondition")[0].fieldValue.string == "False"
                    ? "NotDegraded" : "HostedClusterDegraded")
                  : "ConditionNotFound"
              message:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                  && has(resources.hostedCluster.statusFeedback.values)
                  && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "degradedCondition")
                  ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "degradedCondition")[0].fieldValue.string == "False"
                    ? "HostedCluster is healthy"
                    : "HostedCluster is degraded")
                  : "Degraded condition not yet reported"

          observed_generation:
            expression: "generation"
          observed_time: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"

          data:
            hostedCluster:
              name:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.metadata)
                  ? resources.hostedCluster.metadata.name
                  : ""
              apiEndpoint:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                  && has(resources.hostedCluster.statusFeedback.values)
                  && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "controlPlaneEndpoint")
                  ? "https://" + resources.hostedCluster.statusFeedback.values.filter(v, v.name == "controlPlaneEndpoint")[0].fieldValue.string
                  : ""
              version:
                expression: |
                  has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                  && has(resources.hostedCluster.statusFeedback.values)
                  && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "version")
                  ? resources.hostedCluster.statusFeedback.values.filter(v, v.name == "version")[0].fieldValue.string
                  : ""

    postActions:
      - name: "reportClusterStatus"
        apiCall:
          method: "POST"
          url: "/clusters/{{ .clusterId }}/statuses"
          headers:
            - name: "Content-Type"
              value: "application/json"
          body: "{{ .statusPayload }}"
